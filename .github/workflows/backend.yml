name: Backend Tests

on:
  push:
    branches: [master]
  pull_request:

env:
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  test:
    name: Test / ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - edukate-auth
          - edukate-backend
          - edukate-checker
          - edukate-common
          - edukate-gateway
          - edukate-notifier
          - edukate-storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Cache Gradle build outputs
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache
          key: gradle-build-cache-${{ matrix.module }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-build-cache-${{ matrix.module }}-
      - name: Cache Docker images
        if: contains(fromJson('["edukate-backend","edukate-notifier"]'), matrix.module)
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: docker-mongo8
      - name: Load Docker image from cache
        if: contains(fromJson('["edukate-backend","edukate-notifier"]'), matrix.module) && steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/mongo8.tar
      - name: Run tests
        run: ./gradlew :${{ matrix.module }}:test --no-daemon --build-cache
      - name: Save Docker image to cache
        if: contains(fromJson('["edukate-backend","edukate-notifier"]'), matrix.module) && steps.docker-cache.outputs.cache-hit != 'true'
        run: mkdir -p /tmp/docker-cache && docker save mongo:8 -o /tmp/docker-cache/mongo8.tar
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/jacoco/test/
          retention-days: 14
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.module }}/build/reports/jacoco/test/jacocoTestReport.xml
          flags: ${{ matrix.module }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  backend-status:
    name: Backend Tests
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [ "${{ needs.test.result }}" = "failure" ] || [ "${{ needs.test.result }}" = "cancelled" ]; then
            exit 1
          fi

