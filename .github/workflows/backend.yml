name: Backend Tests

on:
  push:
    branches: [master]
  pull_request:
    paths-ignore:
      - 'edukate-frontend/**'
      - '**.md'

jobs:
  test:
    name: Test / ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - edukate-auth
          - edukate-backend
          - edukate-checker
          - edukate-common
          - edukate-gateway
          - edukate-notifier
          - edukate-storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Run tests
        run: ./gradlew :${{ matrix.module }}:test --no-daemon --parallel
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/jacoco/test/
          retention-days: 14
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.module }}/build/reports/jacoco/test/jacocoTestReport.xml
          flags: ${{ matrix.module }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
