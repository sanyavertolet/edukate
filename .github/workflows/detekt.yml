name: Detekt

on:
  push:
    branches: [master]
  pull_request:

permissions:
  security-events: write  # required for upload-sarif

jobs:
  detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Run Detekt
        run: ./gradlew detekt detektReportMergeSarif
        # continue-on-error ensures the SARIF upload always runs so GitHub can annotate
        # PRs with findings even when the build fails due to violations.
        # The overall job still fails — Gradle's exit code propagates after the upload.
        continue-on-error: true
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/detekt/merge.sarif
