name: Frontend

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - 'edukate-frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  security-events: write  # required for upload-sarif

defaults:
  run:
    working-directory: edukate-frontend

jobs:
  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: edukate-frontend/.nvmrc
          cache: npm
          cache-dependency-path: edukate-frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: edukate-frontend/.nvmrc
          cache: npm
          cache-dependency-path: edukate-frontend/package-lock.json
      - run: npm ci
      - run: npm run generate:types
      - name: Run ESLint
        run: npm run lint:sarif
        continue-on-error: true
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: edukate-frontend/eslint-results.sarif
          category: eslint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: edukate-frontend/.nvmrc
          cache: npm
          cache-dependency-path: edukate-frontend/package-lock.json
      - run: npm ci
      - run: npm run generate:types
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: edukate-frontend/.nvmrc
          cache: npm
          cache-dependency-path: edukate-frontend/package-lock.json
      - run: npm ci
      - run: npm run generate:types
      - run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: edukate-frontend/coverage/
          retention-days: 14
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: edukate-frontend/coverage/lcov.info
          flags: frontend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

