spring.docker.compose.enabled=false
spring.web.error.include-message=always

spring.r2dbc.url=r2dbc:postgresql://admin:secret@localhost:5432/edukate
spring.flyway.url=jdbc:postgresql://localhost:5432/edukate
spring.flyway.user=admin
spring.flyway.password=secret
spring.flyway.locations=classpath:db/migration,classpath:db/dev

springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/swagger/backend

s3.endpoint=http://localhost:9000
s3.region=us-east-1
s3.access-key=minio-admin
s3.secret-key=minio-secret
s3.bucket=edukate-bucket

logging.level.software.amazon.awssdk=DEBUG

gateway.url=http://localhost:5810

spring.rabbitmq.addresses=amqp://guest:guest@localhost:5672

management.tracing.export.enabled=false
logging.level.io.micrometer.registry.otlp=ERROR
