# Override springdoc path to a consistent URL used by the generateOpenApiDocs Gradle task
springdoc.api-docs.path=/v3/api-docs

# Orval generates client<Blob> for '*/*' media type; use application/json as the default
springdoc.default-produces-media-type=application/json

# RabbitMQ — CachingConnectionFactory is lazy, just like the MongoDB driver.
# It only connects when a message is actually sent. Springdoc never calls controller methods,
# so no message is ever published and no broker connection is ever opened.
spring.rabbitmq.addresses=localhost:5672
management.health.rabbit.enabled=false

# R2DBC — uses local PostgreSQL for spec generation (Flyway runs the migration)
spring.r2dbc.url=r2dbc:postgresql://edukate-backend:secret@localhost:5432/edukate
spring.flyway.url=jdbc:postgresql://edukate-backend:secret@localhost:5432/edukate
server.port=18080
management.server.port=18081
spring.docker.compose.enabled=false
spring.devtools.restart.enabled=false

# S3/MinIO — AWS SDK connects lazily; dummy values allow the bean to be created without a real endpoint
s3.region=us-east-1
s3.access-key=dummy
s3.secret-key=dummy
s3.bucket=dummy
s3.endpoint=http://localhost:9000

