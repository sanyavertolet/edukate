spring.application.name=edukate-backend
spring.http.codecs.max-in-memory-size=100MB
spring.r2dbc.url=${SPRING_R2DBC_URL}
spring.r2dbc.pool.initial-size=2
spring.r2dbc.pool.max-size=10
server.port=5800

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/swagger/backend/api-docs
springdoc.swagger-ui.enabled=false

management.server.port=5801
management.endpoints.web.exposure.include=health,info,loggers,prometheus
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}
logging.group.edukate=io.github.sanyavertolet
spring.web.error.include-message=always

s3.region=${S3_REGION}
s3.access-key=${S3_ACCESS_KEY}
s3.secret-key=${S3_SECRET_KEY}
s3.bucket=${S3_BUCKET}
s3.endpoint=${S3_ENDPOINT}
s3.signature-duration=1h

spring.rabbitmq.addresses=${RABBITMQ_ADDRESSES}

gateway.url=https://edukatemeplease.online
