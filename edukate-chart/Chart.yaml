apiVersion: v2
type: application
name: edukate-chart
description: Helm chart for edukate cloud services
version: 0.1.0
appVersion: "0.1.0-SNAPSHOT"
sources:
  - https://github.com/sanyavertolet/edukate

dependencies:
  # LGTM observability stack — enabled via lgtm.enabled=true (off by default)
  - name: kube-prometheus-stack
    version: "~83.4"
    repository: https://prometheus-community.github.io/helm-charts
    condition: lgtm.enabled
  - name: loki
    version: "~6.55"
    repository: https://grafana.github.io/helm-charts
    condition: lgtm.enabled
  - name: tempo
    version: "~1.24"
    repository: https://grafana.github.io/helm-charts
    condition: lgtm.enabled
  - name: promtail
    version: "~6.17"
    repository: https://grafana.github.io/helm-charts
    condition: lgtm.enabled
