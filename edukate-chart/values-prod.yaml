namespace: default
imageRegistry: ghcr.io/sanyavertolet
replicaCount: 1

profile: prod,secure

checker:
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env: staging
pullPolicy: IfNotPresent

ingress:
  tls:
    enabled: true
#   either staging or prod
    profile: "prod"
    email: "lxnfrolov@gmail.com"
  host: "edukate.mooo.com"

s3:
  enabled: true
  secretName: s3-secrets

mongodb:
  enabled: true
  secretName: mongodb-secrets
  secretKey:
    backend: connectionString
    notifier: notifierConnectionString
