namespace: default
imageRegistry: ghcr.io/sanyavertolet
dockerTag: latest
replicaCount: 1

autoscaling:
  enabled: false

# Default resource limits for all Spring Boot services.
# Paketo's memory calculator reads the cgroups memory limit to compute -Xmx and
# -XX:MaxDirectMemorySize. Without a limit, it falls back to 10MB direct memory —
# far too small for Netty + WebFlux + MongoDB. Override per-service with
# .service.resources if needed.
springBootResources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env: staging
initCerts:
  enabled: false
profile: dev
pullPolicy: IfNotPresent

backend:
  name: backend
  imageName: edukate-backend
  profile: prod,secure,notifier
  pullPolicy: Always
  containerPort: 5800
  managementPort: 5801
  clusterIP: null
  applicationProperties:

frontend:
  name: frontend
  imageName: edukate-frontend
  pullPolicy: Always
  containerPort: 80

gateway:
  name: gateway
  imageName: edukate-gateway
  pullPolicy: Always
  containerPort: 5810
  managementPort: 5811
  applicationProperties:

notifier:
  name: notifier
  imageName: edukate-notifier
  pullPolicy: Always
  containerPort: 5820
  managementPort: 5821
  clusterIP: null
  applicationProperties:

checker:
  name: checker
  imageName: edukate-checker
  pullPolicy: Always
  containerPort: 5830
  managementPort: 5831
  clusterIP: null
  applicationProperties:

ingress:
  tls:
    profile: "staging"
    enabled: false

s3:
  enabled: true
  secretName: s3-secrets

mongodb:
  enabled: true
  secretName: mongodb-secrets
  secretKey:
    backend: connectionString
    notifier: notifierConnectionString

jwt:
  secretName: jwt
  secretKey: key

# LGTM observability stack (Loki + Grafana + Tempo + Prometheus).
# Toggle with lgtm.enabled. Sub-chart configs live at the top level (kube-prometheus-stack:,
# loki:, tempo:, promtail:) — Helm requires dependency values at the root, not nested.
# Run `helm dependency update edukate-chart/` once after cloning or adding new dependencies.
lgtm:
  enabled: false

# ── Prometheus + Grafana + Alertmanager ──────────────────────────────────────
# https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
kube-prometheus-stack:
  fullnameOverride: kube-prometheus-stack
  prometheusOperator:
    admissionWebhooks:
      enabled: false
  grafana:
    fullnameOverride: grafana
    # Override via --set or grafana.admin.existingSecret in production
    adminPassword: "changeme"
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        # Read the grafana_folder annotation from each ConfigMap to place dashboards in subfolders
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: false
    persistence:
      enabled: true
      size: 1Gi
    deploymentStrategy:
      type: Recreate
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: edukate-letsencrypt-issuer-prod
      hosts:
        - grafana.edukatemeplease.online
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.edukatemeplease.online
    additionalDataSources:
      # Loki datasource — correlated to Tempo traces via traceId field in JSON logs
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"traceId":"([a-f0-9]+)"'
              url: "${__value.raw}"
              datasourceUid: tempo
      # Tempo datasource — links traces back to Loki logs
      - name: Tempo
        type: tempo
        url: http://tempo:3200
        access: proxy
        uid: tempo
        jsonData:
          tracesToLogs:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
  prometheus:
    prometheusSpec:
      # Enable remote write receiver so Tempo metricsGenerator can push span-derived RED metrics
      enableRemoteWriteReceiver: true
      # Scrape all pods annotated with prometheus.io/scrape: "true".
      # The pod.common.annotations helper in _helpers.tpl already emits these annotations
      # for every Spring Boot service (backend, gateway, notifier, checker).
      additionalScrapeConfigs:
        # RabbitMQ Prometheus plugin — two scrape jobs are required:
        # 1. /metrics          → aggregated broker-level metrics (connections, channels, memory).
        # 2. /metrics/detailed → per-queue labeled metrics (rabbitmq_detailed_* prefix).
        #    Per-queue data only exists here; the default /metrics endpoint aggregates across all queues.
        - job_name: edukate-rabbitmq
          static_configs:
            - targets: ["edukate-rabbit:15692"]
          metrics_path: /metrics
        - job_name: edukate-rabbitmq-detailed
          static_configs:
            - targets: ["edukate-rabbit:15692"]
          metrics_path: /metrics/detailed
          params:
            family:
              - queue_coarse_metrics   # rabbitmq_detailed_queue_messages, _ready, _unacked
              - queue_consumer_count   # rabbitmq_detailed_queue_consumers
        - job_name: edukate-pods
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            # Rewrite pod address to use managementPort from annotation (not containerPort)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            # Carry the kompose service label as "service" for internal Prometheus use.
            # The "application" label is emitted directly by Spring Boot 4 Micrometer
            # autoconfiguration from spring.application.name — no relabeling needed.
            - source_labels: [__meta_kubernetes_pod_label_io_kompose_service]
              action: replace
              target_label: service
  alertmanager:
    enabled: false  # enable once alert routing (PagerDuty/Slack/email) is configured

# ── Loki — log aggregation ───────────────────────────────────────────────────
# SingleBinary mode: single pod, filesystem storage — suitable for small clusters
# https://github.com/grafana/helm-charts/tree/main/charts/loki
loki:
  fullnameOverride: loki
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
      # bucketNames required by chart validation even when type=filesystem
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
  # Disable distributed-mode components (SingleBinary handles all roles)
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  # Disable bundled MinIO — using filesystem storage instead
  minio:
    enabled: false
  # Disable memcached caches — not needed for single-binary filesystem storage
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

# ── Tempo — distributed tracing backend ─────────────────────────────────────
# Receives OTLP traces from Spring Boot services; serves traces to Grafana
# https://github.com/grafana/helm-charts/tree/main/charts/tempo
tempo:
  fullnameOverride: tempo
  tempo:
    # OTLP receivers — Spring Boot services push to http://tempo:4318/v1/traces
    receivers:
      otlp:
        protocols:
          http:
            endpoint: "0.0.0.0:4318"
          grpc:
            endpoint: "0.0.0.0:4317"
    # metricsGenerator derives span-level RED metrics and remote-writes them to Prometheus
    metricsGenerator:
      enabled: true
      remoteWriteUrl: "http://kube-prometheus-stack-prometheus:9090/api/v1/write"
    # Enable the two standard processors globally (single-tenant setup).
    # Without these, metricsGenerator runs but emits nothing useful.
    # service-graphs: service topology edges (calls/errors between services)
    # span-metrics: per-operation RED metrics (requests, errors, duration histograms)
    # per_tenant_override_config must be kept to preserve the file-based override path.
    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
      per_tenant_override_config: /conf/overrides.yaml

# ── Promtail — DaemonSet log shipper ────────────────────────────────────────
# Reads pod stdout/stderr from node filesystem and ships JSON logs to Loki
# https://github.com/grafana/helm-charts/tree/main/charts/promtail
promtail:
  fullnameOverride: promtail
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}
        # Parse JSON emitted by logback-spring.xml (active on non-dev Spring profiles)
        - json:
            expressions:
              level: level
              traceId: traceId
              spanId: spanId
        # Promote to Loki stream labels — enables LogQL: {traceId="abc123"}
        - labels:
            level:
            traceId:
            spanId:
