namespace: default
imageRegistry: ghcr.io/sanyavertolet
dockerTag: latest
replicaCount: 1

autoscaling:
  enabled: false

# Default resource limits for all Spring Boot services.
# Paketo's memory calculator reads the cgroups memory limit to compute -Xmx and
# -XX:MaxDirectMemorySize. Without a limit, it falls back to 10MB direct memory —
# far too small for Netty + WebFlux + MongoDB. Override per-service with
# .service.resources if needed.
springBootResources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env: staging
initCerts:
  enabled: false
profile: dev
pullPolicy: IfNotPresent

backend:
  name: backend
  imageName: edukate-backend
  profile: prod,secure,notifier
  pullPolicy: Always
  containerPort: 5800
  managementPort: 5801
  clusterIP: null
  applicationProperties:

frontend:
  name: frontend
  imageName: edukate-frontend
  pullPolicy: Always
  containerPort: 80

gateway:
  name: gateway
  imageName: edukate-gateway
  pullPolicy: Always
  containerPort: 5810
  managementPort: 5811
  applicationProperties:

notifier:
  name: notifier
  imageName: edukate-notifier
  pullPolicy: Always
  containerPort: 5820
  managementPort: 5821
  clusterIP: null
  applicationProperties:

checker:
  name: checker
  imageName: edukate-checker
  pullPolicy: Always
  containerPort: 5830
  managementPort: 5831
  clusterIP: null
  applicationProperties:

ingress:
  tls:
    profile: "staging"
    enabled: false

s3:
  enabled: true
  secretName: s3-secrets

mongodb:
  enabled: true
  secretName: mongodb-secrets
  secretKey:
    backend: connectionString
    notifier: notifierConnectionString

jwt:
  secretName: jwt
  secretKey: key
