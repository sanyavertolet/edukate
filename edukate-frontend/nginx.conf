server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        application/x-javascript
        image/svg+xml;

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
    }

    # Deny dotfiles (except .well-known)
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Hashed JS/CSS chunks — cache forever (content-addressed by Vite)
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Images and fonts — cache for a week
    location ~* \.(png|jpg|jpeg|gif|webp|ico|woff2|woff|ttf|svg)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # index.html — never cache (SPA entry point, must always be fresh)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
