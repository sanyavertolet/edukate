auth:
  jwt:
    # Dummy secret — only needs to satisfy the HMAC-SHA512 key length requirement (≥64 chars)
    secret: spec-gen-dummy-secret-for-hmac-sha512-algorithm-do-not-use-in-production-padding
  hostname: localhost

spring:
  docker:
    compose:
      enabled: false
  devtools:
    restart:
      enabled: false
  rabbitmq:
    addresses: localhost:5672
  r2dbc:
    url: r2dbc:postgresql://edukate-backend:secret@localhost:5432/edukate
  cloud:
    discovery:
      enabled: false

server:
  port: 18082

management:
  server:
    port: 18083
  health:
    rabbit:
      enabled: false

springdoc:
  api-docs:
    # Override to a consistent path used by the generateOpenApiDocs Gradle task
    path: /v3/api-docs
  # Orval generates client<Blob> for '*/*' media type; use application/json as the default
  default-produces-media-type: application/json
