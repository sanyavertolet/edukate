gateway:
  backend:
    url: http://backend
  notifier:
    url: http://notifier
  url: https://edukatemeplease.online


auth:
  jwt:
    expirationSeconds: 3600
    secret: ${JWT_SECRET}
  hostname: ${HOST_NAME}

springdoc:
  api-docs:
    enabled: true
    path: /swagger/gateway/api-docs
  swagger-ui:
    enabled: true
    urls:
      - name: edukate-gateway
        url: /swagger/gateway/api-docs
      - name: edukate-backend
        url: /swagger/backend/api-docs
      - name: edukate-notifier
        url: /swagger/notifier/api-docs
    config-url: /swagger/gateway/api-docs/swagger-config
    path: /swagger
    disable-swagger-default-url: true
    urls-primary-name: edukate-gateway
    operations-sorter: alpha

spring:
  application:
    name: edukate-gateway
  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME:}
    password: ${SPRING_R2DBC_PASSWORD:}
    pool:
      initial-size: 1
      max-size: 3
  flyway:
    enabled: false
  profiles:
    default: prod,secure
  web:
    error:
      include-message: always
      path: /error
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: gateway_route
              uri: no://op
              predicates:
                - Path=/api/*/auth/*,/swagger/gateway/api-docs/**
            - id: notifier_route
              uri: ${gateway.notifier.url}
              predicates:
                - Path=/api/*/notifications/**,/swagger/notifier/api-docs/**
              filters:
                - RemoveRequestHeader=Cookie
            - id: api_route
              uri: ${gateway.backend.url}
              predicates:
                - Path=/api/**,/swagger/backend/api-docs/**
              filters:
                - RemoveRequestHeader=Cookie

cors:
  allowed-origin-pattern: https://edukatemeplease.online

server:
  port: 5810
management:
  server:
    port: 5811
  endpoints:
    web:
      exposure:
        include: health,info,gateway,loggers,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  group:
    edukate: io.github.sanyavertolet
