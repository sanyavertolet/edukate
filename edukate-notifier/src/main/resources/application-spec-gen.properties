# Override springdoc path to a consistent URL used by the generateOpenApiDocs Gradle task
springdoc.api-docs.path=/v3/api-docs

# Orval generates client<Blob> for '*/*' media type; use application/json as the default
springdoc.default-produces-media-type=application/json

# RabbitMQ — CachingConnectionFactory is lazy; no broker connection until a message is sent.
# Springdoc never calls controller methods, so no connection is ever opened.
spring.rabbitmq.addresses=localhost:5672
management.health.rabbit.enabled=false

# MongoDB — reactive driver is lazy; no connection is opened until first reactive subscription.
# Springdoc never calls controller methods, so this URI is never actually used.
spring.mongodb.uri=mongodb://localhost:27017/spec-gen
spring.data.mongodb.auto-index-creation=false
management.health.mongodb.enabled=false
server.port=18084
management.server.port=18085
spring.docker.compose.enabled=false
spring.devtools.restart.enabled=false

