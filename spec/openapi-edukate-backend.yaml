        "200":
          description: Successfully retrieved check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResultDto"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResultDto"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResultDto"
        "404":
          description: Check result not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResultDto"
      security:
      - cookieAuth: []
  /api/v1/bundles/{shareCode}:
    get:
      tags:
      - Bundles
      summary: Get bundle by share code
      description: Retrieves a bundle by its share code. Public bundles are accessible
        to anyone; private bundles require membership.
      operationId: getBundleByShareCode
      parameters:
      - name: shareCode
        in: path
        description: Bundle share code
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        "200":
          description: Successfully retrieved bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleDto"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleDto"
        "403":
          description: Access denied - bundle is private and user is not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleDto"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleDto"
  /api/v1/bundles/{shareCode}/users:
    get:
