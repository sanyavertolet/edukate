                  $ref: "#/components/schemas/UserNameWithRole"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserNameWithRole"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserNameWithRole"
        "403":
          description: Access denied - Insufficient bundle permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserNameWithRole"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserNameWithRole"
      security:
      - cookieAuth: []
