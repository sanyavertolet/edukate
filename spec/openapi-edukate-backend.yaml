                  $ref: "#/components/schemas/BundleMetadata"
      security:
      - cookieAuth: []
components:
  schemas:
    CreateSubmissionRequest:
      type: object
      properties:
        problemId:
          type: string
          minLength: 1
        fileNames:
          type: array
          items:
            type: string
          minItems: 1
      required:
      - fileNames
      - problemId
    SubmissionDto:
      type: object
      properties:
        id:
          type: string
        problemId:
          type: string
        userName:
          type: string
        status:
          type: string
          enum:
          - PENDING
          - FAILED
          - SUCCESS
        createdAt:
          type: string
          format: date-time
        fileUrls:
          type: array
          items:
            type: string
      required:
      - createdAt
      - fileUrls
      - id
      - problemId
      - status
      - userName
    CreateBundleRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 0
        description:
          type: string
          maxLength: 255
          minLength: 0
        isPublic:
          type: boolean
        problemIds:
          type: array
          items:
            type: string
          minItems: 1
      required:
      - description
      - isPublic
      - name
      - problemIds
    BundleDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        admins:
          type: array
          items:
            type: string
        isPublic:
          type: boolean
        problems:
          type: array
          items:
            $ref: "#/components/schemas/ProblemMetadata"
        shareCode:
          type: string
      required:
      - admins
      - description
      - isPublic
      - name
      - problems
      - shareCode
    ProblemMetadata:
      type: object
      properties:
        name:
          type: string
        isHard:
          type: boolean
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum:
          - SOLVED
          - SOLVING
          - FAILED
          - NOT_SOLVED
      required:
      - isHard
      - name
      - status
      - tags
    ChangeBundleProblemsRequest:
      type: object
      properties:
        problemIds:
          type: array
          items:
            type: string
          minItems: 1
      required:
      - problemIds
    UserDto:
      type: object
      properties:
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: string
      required:
      - name
      - roles
      - status
    Result:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        notes:
          type: string
        images:
          type: array
          items:
            type: string
      required:
      - id
      - images
      - notes
      - text
    ProblemDto:
      type: object
      properties:
        id:
          type: string
        isHard:
          type: boolean
        tags:
          type: array
          items:
            type: string
        text:
          type: string
        subtasks:
          type: array
          items:
            $ref: "#/components/schemas/Subtask"
        images:
          type: array
          items:
            type: string
        status:
          type: string
          enum:
          - SOLVED
          - SOLVING
          - FAILED
          - NOT_SOLVED
        hasResult:
          type: boolean
      required:
      - hasResult
      - id
      - images
      - isHard
      - status
      - subtasks
      - tags
      - text
    Subtask:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
      required:
      - id
      - text
    FileMetadata:
      type: object
      properties:
        key:
          type: string
        authorName:
          type: string
        lastModified:
          type: string
          format: date-time
        size:
          type: integer
          format: int64
      required:
      - authorName
      - key
      - lastModified
      - size
    CheckResultInfo:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum:
          - SUCCESS
          - MISTAKE
          - INTERNAL_ERROR
        trustLevel:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time
      required:
      - createdAt
      - id
      - status
      - trustLevel
    CheckResultDto:
      type: object
      properties:
        status:
          type: string
          enum:
          - SUCCESS
          - MISTAKE
          - INTERNAL_ERROR
        trustLevel:
          type: number
          format: float
        errorType:
          type: string
          enum:
          - ALGEBRAIC
          - CONCEPTUAL
          - INCOMPLETE
          - NONE
          - NUMERICAL
          - UNCLEAR
          - UNIT
        explanation:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
      - createdAt
      - errorType
      - explanation
      - status
      - trustLevel
    UserNameWithRole:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum:
          - USER
          - MODERATOR
          - ADMIN
      required:
      - name
      - role
    BundleMetadata:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        admins:
          type: array
          items:
            type: string
        shareCode:
          type: string
        isPublic:
          type: boolean
        size:
          type: integer
          format: int64
      required:
      - admins
      - description
      - isPublic
      - name
      - shareCode
      - size
  securitySchemes:
    cookieAuth:
      type: apiKey
      description: JWT authentication cookie
      name: X-Auth
      in: cookie
