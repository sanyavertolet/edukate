      parameters:
      - name: page
        in: query
        description: Page number (zero-based)
        required: false
        schema:
          type: string
          minimum: 0
      - name: size
        in: query
        description: Number of bundles per page
        required: false
        schema:
          type: string
          exclusiveMinimum: 0
          maximum: 100
